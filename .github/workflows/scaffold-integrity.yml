name: Scaffold Integrity

on:
  push:
    branches: [main]
    paths:
      - "template/**"
      - "bin/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/scaffold-integrity.yml"
  pull_request:
    branches: [main]
    paths:
      - "template/**"
      - "bin/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/scaffold-integrity.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - combo: full
            flags: "--yes"
          - combo: bare
            flags: "--no-e2e --no-utils --no-lighthouse --no-webp-lint --no-pwa"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"

      - name: Install CLI dependencies
        run: npm install

      # Scaffold from the packed tarball, not npm link, so this also catches
      # packaging regressions (npm silently strips nested dotfiles, etc.).
      - name: Pack CLI tarball
        run: npm pack

      - name: Scaffold ${{ matrix.combo }} app from tarball
        run: |
          TARBALL=$(ls "$PWD"/create-react-adam-*.tgz)
          mkdir -p tmp
          cd tmp
          npx --yes --package="$TARBALL" create-react-adam app-${{ matrix.combo }} ${{ matrix.flags }}
        env:
          CI: true

      - name: Verify scaffold shape
        run: node scripts/verify-scaffold.mjs tmp/app-${{ matrix.combo }} ${{ matrix.combo }}

      - name: Run TypeScript check
        working-directory: tmp/app-${{ matrix.combo }}
        run: npx tsc --noEmit

      - name: Check formatting
        working-directory: tmp/app-${{ matrix.combo }}
        run: npm run format:check

      - name: Run linting
        working-directory: tmp/app-${{ matrix.combo }}
        run: npm run lint:check

      - name: Run build
        working-directory: tmp/app-${{ matrix.combo }}
        run: npm run build

      # PWA on (full combo): the build must emit a service worker and a web
      # app manifest, wire the manifest into index.html, and stamp the app
      # name into it.
      - name: PWA build artifacts exist
        if: matrix.combo == 'full'
        working-directory: tmp/app-full
        run: |
          test -f dist/sw.js
          test -f dist/registerSW.js
          test -f dist/manifest.webmanifest
          grep -q "manifest.webmanifest" dist/index.html
          grep -q "registerSW.js" dist/index.html
          grep -q "app-full" dist/manifest.webmanifest

      # PWA off (bare combo): the build must contain no service worker or
      # manifest — the app behaves exactly as before the PWA feature existed.
      - name: No PWA build artifacts
        if: matrix.combo == 'bare'
        working-directory: tmp/app-bare
        run: |
          test ! -e dist/sw.js
          test ! -e dist/manifest.webmanifest
          test ! -e dist/registerSW.js
          ! grep -q "manifest.webmanifest" dist/index.html

      - name: WebP rule blocks non-WebP images
        if: matrix.combo == 'full'
        working-directory: tmp/app-full
        run: |
          echo 'export const smoke = "/images/hero.png";' > src/webp-smoke.ts
          if npm run lint:check > /dev/null 2>&1; then
            echo "lint:check passed but should have failed on a .png reference"
            exit 1
          fi
          rm src/webp-smoke.ts
          echo "WebP rule correctly rejected a .png reference"

  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24.18.0"

      - name: Install CLI dependencies
        run: npm install

      - name: Pack CLI tarball
        run: npm pack

      - name: Scaffold app from tarball
        run: |
          TARBALL=$(ls "$PWD"/create-react-adam-*.tgz)
          mkdir -p tmp
          cd tmp
          npx --yes --package="$TARBALL" create-react-adam app-lighthouse --yes
        env:
          CI: true

      - name: Build
        working-directory: tmp/app-lighthouse
        run: npm run build

      # Hold the template to the same budgets scaffolded projects get:
      # accessibility >= 95, SEO >= 95, performance >= 85 (lighthouserc.json).
      - name: Run Lighthouse against the template's own budgets
        working-directory: tmp/app-lighthouse
        run: npx --yes @lhci/cli@0.15.x autorun
