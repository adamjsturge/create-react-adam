name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch: {}

jobs:
  build:
    # Renovate merges touch package.json without bumping the version, which
    # would make this publish fail on a duplicate version. For those pushes,
    # renovate-version-bump.yml bumps the version first and then dispatches
    # this workflow.
    if: github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: "https://registry.npmjs.org"
      
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

